events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    resolver 127.0.0.11 valid=10s;
    resolver_timeout 5s;

    # WebSocket Upgrade (если понадобится)
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # Боты — SEO HTML; браузер — SPA
    map $http_user_agent $is_seo_bot {
        default 0;
        ~*(?i)(googlebot|google-inspectiontool|bingbot|bingpreview|yandex(?:bot|images|video|media)?|baiduspider|duckduckbot|facebookexternalhit|facebot|twitterbot|linkedinbot|slackbot|discordbot|telegrambot|applebot|semrushbot|ahrefsbot|dotbot|mj12bot|petalbot|bytespider) 1;
    }

    map $request_uri $gitea_uri_is_md {
        default 0;
        ~*\.md(\?.*)?$ 1;
    }

    map $gitea_uri_is_md $gitea_robots_tag {
        default "noindex, nofollow, noarchive, nosnippet, noimageindex";
        1 "index, follow";
    }

    # Убираем ограничение по размеру загружаемых файлов (база данных масштабируется)
    client_max_body_size 0;

    # Rate limiting для защиты от DDoS (отключено - лимиты убраны)
    # limit_req_zone $binary_remote_addr zone=req_limit_per_ip:10m rate=10r/s;
    # limit_req_zone $binary_remote_addr zone=api_limit_per_ip:10m rate=50r/s;

    # HTTP сервер для локальной разработки (БЕЗ SSL)
    server {
        listen 80;
        server_name ${DOMAIN};

        set $backend_upstream "${BACKEND_CONTAINER}:8000";
        set $gitea_upstream "dapp-gitea:3000";

        root /usr/share/nginx/html;
        index index.html;

        # Healthcheck endpoint
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # Разрешаем доступ к robots.txt и sitemap.xml для поисковых систем
        location = /robots.txt {
            proxy_pass http://$backend_upstream/api/pages/public/robots.txt;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            add_header Content-Type text/plain;
        }

        location = /sitemap.xml {
            proxy_pass http://$backend_upstream/api/pages/public/sitemap.xml;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            add_header Content-Type application/xml;
        }

        # Основной location
        location / {
            # Rate limiting для основных страниц (отключено)
            # limit_req zone=req_limit_per_ip burst=20 nodelay;
            
            try_files $uri $uri/ /index.html;
            
            # Базовые заголовки безопасности
            add_header X-Frame-Options "SAMEORIGIN" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-XSS-Protection "1; mode=block" always;
        }

        location ^~ /blog {
            root /usr/share/nginx/html;

            if ($is_seo_bot = 0) {
                rewrite ^ /index.html last;
            }

            rewrite ^/blog/?$ /blog/index.html break;
            rewrite ^/blog/(.+\.html)$ /blog/$1 break;
            rewrite ^/blog/(.+)$ /blog/$1.html break;
            try_files $uri =404;

            add_header Vary "User-Agent" always;
            add_header Cache-Control "no-cache, must-revalidate" always;
        }

        location ^~ /content/published {
            root /usr/share/nginx/html;

            if ($is_seo_bot = 0) {
                rewrite ^ /index.html last;
            }

            rewrite ^/content/published/?$ /content/published/index.html break;
            rewrite ^/content/published/(.+\.html)$ /content/published/$1 break;
            rewrite ^/content/published/(.+)$ /content/published/$1.html break;
            try_files $uri =404;

            add_header Vary "User-Agent" always;
            add_header Cache-Control "no-cache, must-revalidate" always;
        }

        # Certbot webroot для автоматического получения SSL сертификатов
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
            try_files $uri $uri/ =404;
        }

        # Статические файлы
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            add_header Vary Accept-Encoding;
            
            # Заголовки безопасности для статических файлов
            add_header X-Content-Type-Options "nosniff" always;
        }

        # API — ^~ приоритет перед regex
        location ^~ /api/ {
            # Rate limiting для API (отключено)
            # limit_req zone=api_limit_per_ip burst=100 nodelay;
            
            # Без URI в proxy_pass: при переменной upstream nginx передаёт полный request URI
            proxy_pass http://$backend_upstream;
            proxy_connect_timeout 120s;
            proxy_send_timeout 120s;
            proxy_read_timeout 600s;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Заголовки безопасности для API
            add_header X-Frame-Options "SAMEORIGIN" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-XSS-Protection "1; mode=block" always;
        }

        # WebSocket поддержка — ^~ приоритет
        location ^~ /ws {
            proxy_pass http://$backend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_connect_timeout 120s;
            proxy_send_timeout 120s;
            proxy_read_timeout 600s;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto http;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
        }

        # Gitea: людям — полный доступ; ботам — только URL *.md
        location ^~ /gitea/ {
            set $gitea_deny_bot 0;
            if ($is_seo_bot = 1) {
                set $gitea_deny_bot 1;
            }
            if ($gitea_uri_is_md = 1) {
                set $gitea_deny_bot 0;
            }
            if ($gitea_deny_bot = 1) {
                return 403;
            }

            rewrite ^/gitea/?(.*)$ /$1 break;
            proxy_pass http://$gitea_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Prefix /gitea;
            add_header X-Robots-Tag $gitea_robots_tag always;
            proxy_redirect off;
            proxy_http_version 1.1;
            proxy_connect_timeout 120s;
            proxy_send_timeout 1800s;
            proxy_read_timeout 1800s;
        }

        # Скрытие информации о сервере
        server_tokens off;
    }
}

